<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock · Paper · Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>✧ <span>RPS</span> ✧</h1>

        <!-- scoreboard -->
        <div class="scoreboard">
            <div class="score player-score">
                🧑 <span id="playerScore">0</span>
            </div>
            <div class="score computer-score">
                🤖 <span id="computerScore">0</span>
            </div>
        </div>

        <!-- choice buttons -->
        <div class="choices">
            <button class="choice-btn rock" data-choice="rock">
                <span class="emoji">🪨</span> Rock
            </button>
            <button class="choice-btn paper" data-choice="paper">
                <span class="emoji">📄</span> Paper
            </button>
            <button class="choice-btn scissors" data-choice="scissors">
                <span class="emoji">✂️</span> Scissors
            </button>
        </div>

        <!-- result display -->
        <div class="result-area">
            <div class="round-message" id="roundMessage">
                <span>👋</span> click a move
            </div>
        </div>

        <!-- reset -->
        <div class="reset-area">
            <button id="resetBtn">⟳ reset game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
